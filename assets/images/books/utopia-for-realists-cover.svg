<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Utopia for Realists cover</title>
  <desc id="desc">A pale blue book cover with black title text and a small open mailbox illustration.</desc>
  <rect width="800" height="1200" fill="#b8dfe8"/>
  <text x="120" y="110" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="34" letter-spacing="2">RUTGER BREGMAN</text>
